  <!-- Purpose: Implement desired functionality to contribute to a simulated travel agency website and database -->
<html>
<head>
    <meta charset="UTF-8">
    <title>Update Client</title>
    <!-- Top bar and shared layout styles -->
    <link rel="stylesheet" href="/images/pageStyling.css">
    <!-- Form specific styles -->
    <link rel="stylesheet" href="/images/formPageStyling.css">
</head>

<body class="form-page">

    <!-- Top bar -->
    <div class="top-bar">
        <a href="http://localhost:3000/home" class="top-bar-logo-link">
            <img src="/images/images/small_ship.jpg"
                 alt="Travel Agency Icon">
        </a>

        <div class="top-bar-title">
            Travel Agency
        </div>

        <a href="http://localhost:3000/logout"
           onclick="return confirm('Are you sure you want to sign out? This will end your current session.');"
           class="top-bar-signout">
            <span>Sign Out</span>
            <img src="/images/images/sign_out.jpg" alt="Sign Out">
        </a>
    </div>

    <!-- Back link below logo / top bar -->
    <a href="/clients" class="back-link-top">Back to Client Options</a>

    <div class="form-content">

        <!-- Page title -->
        <h3 class="page-title">Update Client</h3>

        <!-- Main form card -->
        <div class="form-container">
            <form name="clientUpdate"
                  action="http://localhost:3000/client-update"
                  method="post"
                  autocomplete="off">

                <p>Enter the Client ID you want to update. Leave any field blank to keep current value.</p>

                <!-- Client ID -->
                <label for="client_id">Client ID to Update</label>
                <input type="number"
                       name="client_id"
                       id="client_id"
                       required
                       placeholder="Enter the client's ID">

                <!-- New values -->
                <label for="client_name">New Client Name</label>
                <input type="text"
                       name="client_name"
                       id="client_name"
                       placeholder="Enter the client's updated name">

                <label for="dob">New Date of Birth</label>
                <input type="date"
                       name="dob"
                       id="dob">

                <label for="email">New Email</label>
                <input type="email"
                       name="email"
                       id="email"
                       placeholder="ex. email@email.com">

                <label for="phone">New Phone</label>
                <input type="text"
                       name="phone"
                       id="phone"
                       placeholder="ex. 123-456-7890">

                <!-- Interests row -->
                <label>New Interests</label>
                <div class="interest-row">
                    <select name="interest1" id="interest1">
                        <option value="">Optional</option>
                        <option value="Site-seeing">Site-seeing</option>
                        <option value="Good for Kids">Good for Kids</option>
                        <option value="Thrilling">Thrilling</option>
                        <option value="Adults Only">Adults Only</option>
                        <option value="Historical">Historical</option>
                        <option value="Laid Back">Laid Back</option>
                    </select>

                    <span class="interest-or">and / or</span>

                    <select name="interest2" id="interest2">
                        <option value="">Optional</option>
                        <option value="Site-seeing">Site-seeing</option>
                        <option value="Good for Kids">Good for Kids</option>
                        <option value="Thrilling">Thrilling</option>
                        <option value="Adults Only">Adults Only</option>
                        <option value="Historical">Historical</option>
                        <option value="Laid Back">Laid Back</option>
                    </select>

                    <span class="interest-or">and / or</span>

                    <select name="interest3" id="interest3">
                        <option value="">Optional</option>
                        <option value="Site-seeing">Site-seeing</option>
                        <option value="Good for Kids">Good for Kids</option>
                        <option value="Thrilling">Thrilling</option>
                        <option value="Adults Only">Adults Only</option>
                        <option value="Historical">Historical</option>
                        <option value="Laid Back">Laid Back</option>
                    </select>
                </div>

                <small>(Leave all three blank to keep existing interests. Enter 1–3 to replace them.)</small>

                <!-- Submit -->
                <div class="button-row">
                    <input type="submit" value="Update Client">
                </div>
            </form>
        </div>
    </div>

    <script>
        // Repopulate inputs on error redirect
        const params = new URLSearchParams(window.location.search);

        function setValue(name) {
            const el = document.querySelector(`[name="${name}"]`);
            if (!el) return;
            const val = params.get(name);
            if (val !== null) el.value = val;
        }

        [
            "client_id", "client_name", "dob", "email",
            "phone", "interest1", "interest2", "interest3"
        ].forEach(setValue);
    </script>
    <script>
        // Set the maximum date for Date of Birth to today's date
        function setMaxDateForDOB() {
            const today = new Date();
            // Get today's date components
            let month = today.getMonth() + 1; 
            let day = today.getDate();
            const year = today.getFullYear();

            
            if (month < 10) month = '0' + month;
            if (day < 10) day = '0' + day;

            const maxDate = `${year}-${month}-${day}`; 

            const dobInput = document.getElementById('dob');
            if (dobInput) {
               
                dobInput.setAttribute('max', maxDate);
              
                dobInput.dataset.maxDate = maxDate; 
            }
        }

        // Run the function when the page loads
        setMaxDateForDOB();
    </script>

    <script>
        document.forms["clientUpdate"].addEventListener("submit", function (event) {
            let form = this;
            let errors = [];

            // Validate email if entered
            if (form.email.value.trim() !== "") {
                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailPattern.test(form.email.value.trim())) {
                    errors.push("Email: Please enter a valid email address.");
                }
            }

            // Validate phone if entered
            if (form.phone.value.trim() !== "") {
                const phonePattern = /^[0-9()\-\s+]+$/;
                if (!phonePattern.test(form.phone.value.trim())) {
                    errors.push("Phone: Only digits, spaces, parentheses, dashes, or '+' allowed.");
                }
            }

            // Handle errors
            if (errors.length > 0) {
                event.preventDefault(); // stop form submit
                alert("Please fix the following:\n\n" + errors.join("\n"));
            }
        });
    </script>


</body>

</html>
