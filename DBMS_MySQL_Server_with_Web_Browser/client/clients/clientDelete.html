<html>

<head>
    <meta charset="UTF-8">
    <title>Delete Client</title>

    <!-- Shared top bar + layout styles -->
    <link rel="stylesheet" href="/images/pageStyling.css">

    <!-- Shared form styling -->
    <link rel="stylesheet" href="/images/formPageStyling.css">
</head>

<body class="form-page">

    <!-- Top bar -->
    <div class="top-bar">
        <a href="http://localhost:3000/home" class="top-bar-logo-link">
            <img src="/images/images/small_ship.jpg" alt="Travel Agency Icon">
        </a>

        <div class="top-bar-title">Travel Agency</div>

        <a href="http://localhost:3000/logout" onclick="return confirm('Are you sure you want to sign out?');"
            class="top-bar-signout">
            <span>Sign Out</span>
            <img src="/images/images/sign_out.jpg" alt="Sign Out">
        </a>
    </div>

    <!-- Back Link Under Top Bar -->
    <a href="/clients" class="back-link-top">Back to Client Options</a>

    <div class="form-content">

        <!-- Page Title -->
        <h3 class="page-title">Delete Client</h3>

        <!-- Centered Form Card -->
        <div class="form-container">
            <form name="clientDelete" action="http://localhost:3000/client-delete" method="post"
                onsubmit="return confirmDeletion()">

                <p>Enter the Client ID you want to delete.</p>

                <label for="client_id">Client ID</label>
                <input type="number" id="client_id" name="client_id" required placeholder="Enter the client's ID (positive number) to delete">

                <div class="button-row">
                    <input type="submit" value="Delete Client" style="background-color:#d9534f;">
                </div>
            </form>
        </div>

    </div>

</body>

</html>

<script>
    document.forms["clientDelete"].addEventListener("submit", function (event) {
        const idField = document.getElementById("client_id");
        const id = idField.value.trim();
        let errors = [];

        // --- REQUIRED FIELD ---
        if (!id) {
            errors.push("Client ID is required.");
        } else if (Number(id) <= 0) {
            errors.push("Client ID must be a positive number.");
        }

        if (errors.length > 0) {
            event.preventDefault();
            alert("Please fix the following:\n\n" + errors.join("\n"));
            return;
        }

        // --- CONFIRMATION PROMPT ---
        const confirmation = prompt(
            "Are you sure you want to delete Client ID " + id + "?\n\n" +
            "If YES, re-enter the Client ID.\n" +
            "If NO, hit Cancel."
        );

        if (confirmation === null) {
            alert("Deletion cancelled.");
            event.preventDefault();
            return;
        }

        if (confirmation !== id) {
            alert("Client ID did not match. Deletion cancelled.");
            event.preventDefault();
        }
    });
</script>
