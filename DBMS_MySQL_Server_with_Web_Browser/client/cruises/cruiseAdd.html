<html>
<head>
    <meta charset="UTF-8">
    <title>Add Cruise</title>

    <!-- Shared top bar + layout styles -->
    <link rel="stylesheet" href="/images/pageStyling.css">
    <!-- Shared form styling -->
    <link rel="stylesheet" href="/images/formPageStyling.css">
</head>

<body class="form-page">

    <!-- Top bar -->
    <div class="top-bar">
        <a href="http://localhost:3000/home" class="top-bar-logo-link">
            <img src="/images/images/small_ship.jpg"
                 alt="Travel Agency Icon">
        </a>

        <div class="top-bar-title">
            Travel Agency
        </div>

        <a href="http://localhost:3000/logout"
           onclick="return confirm('Are you sure you want to sign out? This will end your current session.');"
           class="top-bar-signout">
            <span>Sign Out</span>
            <img src="/images/images/sign_out.jpg" alt="Sign Out">
        </a>
    </div>

    <!-- Back link under top bar / logo -->
    <a href="/cruises" class="back-link-top">Back to Cruise Options</a>

    <div class="form-content">

        <!-- Page title -->
        <h3 class="page-title">Add Cruise</h3>

        <!-- Main form card -->
        <div class="form-container">
            <form name="cruiseAdd"
                  action="http://localhost:3000/cruise-add"
                  method="post"
                  autocomplete="off">

                <!-- Cruise ID -->
                <label for="cruise_id">Cruise ID</label>
                <input type="number"
                       name="cruise_id"
                       id="cruise_id"
                       placeholder="Enter a positive number"
                       required>

                <!-- Cruise Name -->
                <label for="cruise_name">Cruise Name</label>
                <input type="text"
                       name="cruise_name"
                       id="cruise_name"
                       placeholder="Enter the cruise's name"
                       required>

                <!-- Origin -->
                <label for="origin">Origin</label>
                <input type="text"
                       name="origin"
                       id="origin"
                       placeholder="Enter the cruise's origin"
                       required>

                <!-- Destination -->
                <label for="destination">Destination</label>
                <input type="text"
                       name="destination"
                       id="destination"
                       placeholder="Enter the cruise's destination"
                       required>

                <!-- Departure Date -->
                <label for="departure_date">Departure Date</label>
                <input type="date"
                       name="departure_date"
                       id="departure_date"
                       placeholder="Enter the cruise's departure date"
                       required>

                <!-- Arrival Date -->
                <label for="arrival_date">Arrival Date</label>
                <input type="date"
                       name="arrival_date"
                       id="arrival_date"
                       placeholder="Enter the cruise's arrival data"
                       required>

                <!-- Ticket Price -->
                <label for="ticket_price">Ticket Price (USD)</label>
                <input type="number"
                       step="0.01"
                       min="0"
                       name="ticket_price"
                       id="ticket_price"
                       placeholder="Enter the cruise's price"
                       required>

                <!-- Categories row -->
                <label>Categories (Category 1 required)</label>
                <div class="interest-row">
                    <select name="category1" id="category1" required>
                        <option value="">Select one... (required)</option>
                        <option value="Site-seeing">Site-seeing</option>
                        <option value="Good for Kids">Good for Kids</option>
                        <option value="Thrilling">Thrilling</option>
                        <option value="Adults Only">Adults Only</option>
                        <option value="Historical">Historical</option>
                        <option value="Laid Back">Laid Back</option>
                    </select>

                    <span class="interest-or">and / or</span>

                    <select name="category2" id="category2">
                        <option value="">Optional</option>
                        <option value="Site-seeing">Site-seeing</option>
                        <option value="Good for Kids">Good for Kids</option>
                        <option value="Thrilling">Thrilling</option>
                        <option value="Adults Only">Adults Only</option>
                        <option value="Historical">Historical</option>
                        <option value="Laid Back">Laid Back</option>
                    </select>

                    <span class="interest-or">and / or</span>

                    <select name="category3" id="category3">
                        <option value="">Optional</option>
                        <option value="Site-seeing">Site-seeing</option>
                        <option value="Good for Kids">Good for Kids</option>
                        <option value="Thrilling">Thrilling</option>
                        <option value="Adults Only">Adults Only</option>
                        <option value="Historical">Historical</option>
                        <option value="Laid Back">Laid Back</option>
                    </select>
                </div>

                <!-- Submit -->
                <div class="button-row">
                    <input type="submit" value="Add Cruise">
                </div>
            </form>
        </div>

    </div>

</body>

</html>

<script>
    // Allows for boxes to re-populate if an error occurs

    // Read query parameters from the URL
    const params = new URLSearchParams(window.location.search);

    function setValue(name) {
        const el = document.querySelector(`[name="${name}"]`);
        if (!el) return;
        const val = params.get(name);
        if (val !== null) {
            el.value = val;
        }
    }

    // Regular inputs
    setValue("cruise_id");
    setValue("cruise_name");
    setValue("origin");
    setValue("destination");
    setValue("departure_date");
    setValue("arrival_date");
    setValue("ticket_price");

    // Selects for categories
    function setSelect(name) {
        const el = document.querySelector(`select[name="${name}"]`);
        if (!el) return;
        const val = params.get(name);
        if (val !== null) {
            el.value = val;
        }
    }

    setSelect("category1");
    setSelect("category2");
    setSelect("category3");
</script>

<script>
        // Set the minimum date for Departure Date to today's date
        function setMinDateForDeparture() {
            const today = new Date();
          
            let month = today.getMonth() + 1; 
            let day = today.getDate();
            const year = today.getFullYear();

            if (month < 10) month = '0' + month;
            if (day < 10) day = '0' + day;

            const minDate = `${year}-${month}-${day}`; 

            const departureInput = document.getElementById('departure_date');
            if (departureInput) {
                departureInput.setAttribute('min', minDate);
                
                const arrivalInput = document.getElementById('arrival_date');
                if (arrivalInput) {
                    arrivalInput.setAttribute('min', minDate);
                }
            }
        }

        // Run the function when the page loads
        setMinDateForDeparture();
    </script>

<script>
    // Client-side validation for adding a cruise
    document.forms["cruiseAdd"].addEventListener("submit", function (event) {
        let form = this;
        let errors = [];

        // --- Required check utility ---
        function checkRequired(field, label) {
            if (!field.value || String(field.value).trim() === "") {
                errors.push(`${label} is required.`);
            }
        }

        // --- CATEGORY DUPLICATION CHECK ---
        function checkUniqueCategories() {
            const c1 = form.category1.value;
            const c2 = form.category2.value;
            const c3 = form.category3.value;

            if (c1 && c2 && c1 === c2) {
                errors.push("Category 2 cannot match Category 1.");
            }
            if (c1 && c3 && c1 === c3) {
                errors.push("Category 3 cannot match Category 1.");
            }
            if (c2 && c3 && c2 === c3 && c2 !== "") {
                errors.push("Category 2 and Category 3 cannot match each other.");
            }
        }

        // --- REQUIRED FIELDS ---
        checkRequired(form.cruise_id, "Cruise ID");
        checkRequired(form.cruise_name, "Cruise Name");
        checkRequired(form.origin, "Origin");
        checkRequired(form.destination, "Destination");
        checkRequired(form.departure_date, "Departure Date");
        checkRequired(form.arrival_date, "Arrival Date");
        checkRequired(form.ticket_price, "Ticket Price");
        checkRequired(form.category1, "Category 1");

        // --- DATE LOGIC ---
        if (form.departure_date.value && form.arrival_date.value) {
            if (form.arrival_date.value < form.departure_date.value) {
                errors.push("Arrival Date cannot be before Departure Date.");
            }
        }

        // --- PRICE VALIDATION ---
        if (form.ticket_price.value) {
            let price = Number(form.ticket_price.value);
            if (price <= 0) {
                errors.push("Ticket Price must be greater than 0.");
            }
        }

        // --- CATEGORY MATCHING ---
        checkUniqueCategories();

        // --- DISPLAY ERRORS ---
        if (errors.length > 0) {
            event.preventDefault(); // Stop the form submission
            alert("Please fix the following:\n\n" + errors.join("\n"));
        }
    });
</script>
