  <!-- Purpose: Implement desired functionality to contribute to a simulated travel agency website and database -->
<html>
<head>
    <title>Cruises Page</title>
    <link rel="stylesheet" href="/images/pageStyling.css">
</head>

<body class="landing-page cruises-landing">

    <!-- Top bar -->
    <div class="top-bar">
        <a href="http://localhost:3000/home" class="top-bar-logo-link">
            <img src="/images/images/small_ship.jpg"
                alt="Travel Agency Icon">
        </a>

        <div class="top-bar-title">
            Travel Agency
        </div>

        <a href="http://localhost:3000/logout"
           onclick="return confirm('Are you sure you want to sign out? This will end your current session.');"
           class="top-bar-signout">
            <span>Sign Out</span>
            <img src="/images/images/sign_out.jpg" alt="Sign Out">
        </a>
    </div>

    <div class="landing-content">
        <h1 class="landing-title">Cruises Page</h1>

        <div class="card-grid">

            <a href="http://localhost:3000/cruise-search" class="option-card">
                <img src="/images/images/magnifying_glass.jpg"
                     alt="Search cruises"
                     class="option-card-icon">
                <div class="option-card-label">Search for Cruises</div>
            </a>

            <a href="http://localhost:3000/cruise-add" class="option-card">
                <img src="/images/images/plus_sign.jpg"
                     alt="Add cruise"
                     class="option-card-icon">
                <div class="option-card-label">Add a Cruise</div>
            </a>

            <a href="http://localhost:3000/cruise-update" class="option-card">
                <img src="/images/images/pencil_eraser.jpg"
                     alt="Update cruise"
                     class="option-card-icon">
                <div class="option-card-label">Update a Cruise</div>
            </a>

            <a href="http://localhost:3000/cruise-delete" class="option-card">
                <img src="/images/images/trashcan.jpg"
                     alt="Remove cruise"
                     class="option-card-icon">
                <div class="option-card-label">Remove a Cruise</div>
            </a>

        </div>

    </div>

</body>
</html>
